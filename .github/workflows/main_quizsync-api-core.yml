# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy Node.js app to Azure Web App - quizsync-api-core
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"
      - name: npm install
        working-directory: apps/api-core
        run: npm install
      - name: prisma generate (before build)
        working-directory: apps/api-core
        run: npx prisma generate
      - name: build
        working-directory: apps/api-core
        run: npm run build
      - name: npm prune production
        working-directory: apps/api-core
        run: npm prune --production
      - name: prisma generate (after prune)
        working-directory: apps/api-core
        run: npx prisma generate
      - name: Verify build files exist
        working-directory: apps/api-core
        run: |
          echo "Checking dist/src/main.js..."
          ls -la dist/src/main.js || exit 1
          echo "Checking .prisma/client..."
          ls -la node_modules/.prisma/client/ || exit 1
          echo "All files verified!"
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: apps/api-core
          retention-days: 1
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C175F06949ED452F9591E672D8394B48 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8651A40760BC45809AF8E77307699C39 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E9F6270DD792447291BCC42DFE937165 }}
      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "quizsync-api-core"
          slot-name: "Production"
          package: .
