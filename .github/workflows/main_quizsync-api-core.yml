# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy Node.js app to Azure Web App - quizsync-api-core
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: pnpm install (all dependencies)
        working-directory: apps/api-core
        run: pnpm install
      - name: prisma generate
        working-directory: apps/api-core
        run: pnpm exec prisma generate
      - name: build
        working-directory: apps/api-core
        run: pnpm run build
      - name: Remove dev dependencies with pnpm prune
        working-directory: apps/api-core
        run: pnpm prune --prod
      - name: Verify critical files
        working-directory: apps/api-core
        run: |
          echo "Checking dist/src/main.js..."
          test -f dist/src/main.js || (echo "ERROR: dist/src/main.js not found" && exit 1)
          echo "✓ dist/src/main.js found"

          echo "Checking node_modules/@prisma/client..."
          test -d node_modules/@prisma/client || (echo "ERROR: @prisma/client not found" && exit 1)
          echo "✓ @prisma/client found"

          echo "All critical files verified!"
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: apps/api-core
          retention-days: 1
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C175F06949ED452F9591E672D8394B48 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8651A40760BC45809AF8E77307699C39 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E9F6270DD792447291BCC42DFE937165 }}
      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "quizsync-api-core"
          slot-name: "Production"
          package: .
