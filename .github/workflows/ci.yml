name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  validate:
    name: Validate ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [cliente, studio, api-core, game-engine]

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
        cache-dependency-path: 'apps/${{ matrix.app }}/pnpm-lock.yaml'

    - name: Install dependencies
      working-directory: apps/${{ matrix.app }}
      run: pnpm install --frozen-lockfile

    - name: Lint
      working-directory: apps/${{ matrix.app }}
      run: pnpm run lint --if-present

    - name: Typecheck
      working-directory: apps/${{ matrix.app }}
      run: pnpm run typecheck --if-present

    - name: Run Tests
      working-directory: apps/${{ matrix.app }}
      run: pnpm run test:ci --if-present

    - name: Build Check
      working-directory: apps/${{ matrix.app }}
      run: pnpm run build
