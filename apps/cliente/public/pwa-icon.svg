<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Fondo Base del Icono (Amarillo característico) -->
  <rect width="512" height="512" rx="128" fill="#FFD166"/>
  
  <!-- Mancha de color offset estilo "Hand-drawn" (Rosa) -->
  <path d="M 90 130 Q 256 70, 410 140 Q 450 256, 430 410 Q 256 470, 100 390 Q 60 256, 90 130 Z" fill="#FF6F61" />
  
  <!-- Sombra de la letra Q para dar profundidad -->
  <path d="M 268 132 C 182 132 132 192 132 268 C 132 344 182 404 268 404 C 354 404 404 344 404 268 C 404 192 354 132 268 132 Z" fill="#1A0B2E"/>
  <path d="M 332 332 L 452 452" stroke="#1A0B2E" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Letra 'Q' Blanca (Borde grueso) -->
  <path d="M 256 120 C 170 120 120 180 120 256 C 120 332 170 392 256 392 C 342 392 392 332 392 256 C 392 180 342 120 256 120 Z" fill="#FFFFFF" stroke="#1A0B2E" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 320 320 L 440 440" stroke="#1A0B2E" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 320 320 L 440 440" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Brillo / trazo de sketch interior -->
  <path d="M 230 170 C 170 170 160 210 160 260" stroke="#1A0B2E" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
</svg>
