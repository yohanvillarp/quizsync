<!DOCTYPE html><html class="light" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>QuizSync - Selección de Personaje</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&amp;family=Karla:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "primary": "#091426",
                "on-surface": "#1b1c1a",
                "surface-dim": "#dbdad6",
                "on-background": "#1b1c1a",
                "secondary-container": "#f2e580",
                "background": "#faf9f5",
                "surface": "#faf9f5",
                "outline-variant": "#c5c6cd",
                "on-primary": "#ffffff",
                "on-surface-variant": "#45474c",
            },
            "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
            },
            "spacing": {
                "unit": "4px",
                "margin-page": "2rem",
                "gutter": "1.5rem",
                "stack-sm": "0.5rem",
                "stack-md": "1.5rem",
                "stack-lg": "3rem"
            },
            "fontFamily": {
                "label-md": ["Bricolage Grotesque"],
                "headline-xl": ["Bricolage Grotesque"],
                "body-md": ["Karla"],
                "headline-lg": ["Bricolage Grotesque"]
            },
            "fontSize": {
                "label-md": ["14px", {"lineHeight": "1.0", "fontWeight": "600"}],
                "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                "body-md": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                "headline-lg": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-image: 
                linear-gradient(rgba(188, 199, 222, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(188, 199, 222, 0.2) 1px, transparent 1px);
            background-size: 24px 24px;
            background-attachment: fixed;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' style='fill:black'><path d='M14.06,9L15,9.94L5.92,19H5V18.08L14.06,9M17.66,3C17.41,3 17.15,3.1 16.96,3.29L15.13,5.12L18.88,8.87L20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18.17,3.09 17.92,3 17.66,3M14.06,6.19L3,17.25V21H6.75L17.81,9.94L14.06,6.19Z'/></svg>"), auto;
        }

        .sketchy-border {
            border: 2px solid #091426;
            box-shadow: 4px 4px 0px #091426;
            transition: all 0.1s ease;
        }

        .sketchy-border:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #091426;
        }

        .polaroid {
            border: 2px solid #091426;
            background: #ffffff;
            box-shadow: 6px 6px 0px #091426;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 240px;
            margin: 0 auto;
        }

        .polaroid:hover {
            transform: translateY(-5px) rotate(0deg) !important;
            box-shadow: 10px 10px 0px #091426;
        }

        .polaroid.selected {
            background-color: #f2e580;
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 8px 8px 0px #091426;
            border-width: 3px;
        }

        .highlighter-btn {
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .highlighter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f2e580;
            z-index: -1;
            clip-path: polygon(2% 15%, 95% 5%, 98% 85%, 5% 95%);
            transition: all 0.2s ease;
        }

        .highlighter-btn:hover::before {
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        }

        /* SVG Animations */
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
        @keyframes wag {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(15deg); }
        }
        @keyframes tilt {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-20deg); }
        }
        @keyframes twitch {
            0%, 80%, 100% { transform: rotate(0deg); }
            85%, 95% { transform: rotate(10deg); }
            90% { transform: rotate(-10deg); }
        }

        .anim-eyes { animation: blink 4s infinite; transform-origin: center; }
        
        /* Fox Animation */
        .selected .fox-tail { animation: wag 0.8s infinite ease-in-out; transform-origin: 100px 150px; }
        
        /* Owl Animation */
        .selected .owl-head { animation: tilt 2s infinite ease-in-out; transform-origin: 100px 80px; }
        
        /* Bear Animation */
        .selected .bear-arm { animation: wave 0.6s infinite ease-in-out; transform-origin: 70px 110px; }
        
        /* Cat Animation */
        .selected .cat-ear { animation: twitch 2s infinite; transform-origin: center; }

        .doodle-ink {
            stroke: #091426;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .jitter {
            animation: jitter 0.4s infinite ease-in-out;
        }

        @keyframes jitter {
            0% { transform: translate(0,0) rotate(-0.5deg); }
            25% { transform: translate(1px, -1px) rotate(0deg); }
            50% { transform: translate(-1px, 1px) rotate(0.5deg); }
            75% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(0,0) rotate(-0.5deg); }
        }

        .doodle-arrow {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            opacity: 0.6;
            color: #091426;
        }
    </style>
</head>
<body class="min-h-screen bg-background font-body-md text-on-background selection:bg-secondary-container">
<header class="sticky top-0 z-50 bg-surface border-b-4 border-primary flex justify-between items-center w-full px-margin-page py-stack-sm max-w-full">
<div class="text-headline-lg font-headline-lg font-black text-primary italic transform -rotate-1">
        QuizSync
    </div>
<button class="sketchy-border bg-surface px-6 py-2 flex items-center gap-2 font-label-md text-label-md hover:bg-secondary-container transition-transform duration-75 ease-in-out active:scale-95" onclick="window.history.back()">
<span class="material-symbols-outlined">arrow_back</span>
        VOLVER
    </button>
</header>
<main class="max-w-7xl mx-auto px-margin-page py-stack-lg relative">
<span class="material-symbols-outlined doodle-arrow text-4xl top-10 left-4 transform rotate-45 jitter">near_me</span>
<span class="material-symbols-outlined doodle-arrow text-3xl top-1/4 right-10 transform -rotate-12 jitter" style="animation-delay: 0.1s">star</span>
<div class="mb-stack-lg text-center">
<h1 class="font-headline-xl text-headline-xl text-primary inline-block relative">
            ELIGE TU AVATAR
            <div class="absolute -bottom-2 left-0 w-full h-1 bg-primary opacity-30 transform -rotate-1"></div>
</h1>
<p class="mt-stack-sm text-on-surface-variant font-label-md text-label-md opacity-80 uppercase tracking-widest">Selecciona tu compañero de estudio</p>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto items-center" id="character-grid">
<!-- Fox Character -->
<div class="polaroid p-4 pb-6 flex flex-col items-center cursor-pointer" onclick="selectCharacter(this, 'Zorro')" style="transform: rotate(-1.5deg)">
<div class="w-full aspect-square bg-white mb-4 flex items-center justify-center relative overflow-visible">
<svg class="w-full h-full" viewBox="0 0 200 200">
<!-- Fox Body -->
<path class="doodle-ink" d="M70,160 Q100,175 130,160 Q145,130 135,100 L65,100 Q55,130 70,160 Z"></path>
<!-- Tail -->
<path class="doodle-ink fox-tail" d="M130,150 Q170,140 180,110 Q170,80 150,100"></path>
<!-- Head -->
<path class="doodle-ink" d="M60,100 L140,100 L100,140 Z" fill="white"></path>
<!-- Ears -->
<path class="doodle-ink" d="M70,100 L60,70 L90,90 M130,100 L140,70 L110,90"></path>
<g class="anim-eyes">
<circle cx="85" cy="110" fill="#091426" r="3"></circle>
<circle cx="115" cy="110" fill="#091426" r="3"></circle>
</g>
<circle cx="100" cy="125" fill="#091426" r="4"></circle>
</svg>
</div>
<span class="font-headline-lg text-primary uppercase">Zorro</span>
</div>
<!-- Owl Character -->
<div class="polaroid p-4 pb-6 flex flex-col items-center cursor-pointer" onclick="selectCharacter(this, 'Búho')" style="transform: rotate(1deg)">
<div class="w-full aspect-square bg-white mb-4 flex items-center justify-center relative overflow-visible">
<svg class="w-full h-full" viewBox="0 0 200 200">
<!-- Owl Body -->
<ellipse class="doodle-ink" cx="100" cy="130" rx="45" ry="50"></ellipse>
<!-- Head -->
<g class="owl-head">
<path class="doodle-ink" d="M60,80 Q100,60 140,80 L140,120 Q100,140 60,120 Z" fill="white"></path>
<!-- Feather tufts -->
<path class="doodle-ink" d="M70,85 L60,65 M130,85 L140,65"></path>
<g class="anim-eyes">
<circle class="doodle-ink" cx="80" cy="100" r="12"></circle>
<circle class="doodle-ink" cx="120" cy="100" r="12"></circle>
<circle cx="80" cy="100" fill="#091426" r="4"></circle>
<circle cx="120" cy="100" fill="#091426" r="4"></circle>
</g>
<path class="doodle-ink" d="M95,110 L100,120 L105,110"></path>
</g>
<!-- Wings -->
<path class="doodle-ink" d="M55,110 Q35,130 55,160 M145,110 Q165,130 145,160"></path>
</svg>
</div>
<span class="font-headline-lg text-primary uppercase">Búho</span>
</div>
<!-- Bear Character -->
<div class="polaroid p-4 pb-6 flex flex-col items-center cursor-pointer" onclick="selectCharacter(this, 'Oso')" style="transform: rotate(-0.5deg)">
<div class="w-full aspect-square bg-white mb-4 flex items-center justify-center relative overflow-visible">
<svg class="w-full h-full" viewBox="0 0 200 200">
<!-- Body -->
<path class="doodle-ink" d="M70,110 Q60,180 100,185 Q140,180 130,110" fill="white"></path>
<!-- Arms -->
<path class="doodle-ink bear-arm" d="M70,120 Q40,110 50,90"></path>
<path class="doodle-ink" d="M130,120 Q160,130 150,150"></path>
<!-- Head -->
<circle class="doodle-ink" cx="100" cy="75" fill="white" r="38"></circle>
<!-- Ears -->
<circle class="doodle-ink" cx="70" cy="50" r="12"></circle>
<circle class="doodle-ink" cx="130" cy="50" r="12"></circle>
<g class="anim-eyes">
<circle cx="88" cy="75" fill="#091426" r="4"></circle>
<circle cx="112" cy="75" fill="#091426" r="4"></circle>
</g>
<ellipse class="doodle-ink" cx="100" cy="90" rx="10" ry="6"></ellipse>
<path class="doodle-ink" d="M100,96 L100,102 Q100,108 92,108 M100,102 Q100,108 108,108"></path>
</svg>
</div>
<span class="font-headline-lg text-primary uppercase">Oso</span>
</div>
<!-- Cat Character -->
<div class="polaroid p-4 pb-6 flex flex-col items-center cursor-pointer" onclick="selectCharacter(this, 'Gato')" style="transform: rotate(2deg)">
<div class="w-full aspect-square bg-white mb-4 flex items-center justify-center relative overflow-visible">
<svg class="w-full h-full" viewBox="0 0 200 200">
<!-- Body -->
<path class="doodle-ink" d="M80,120 Q60,180 100,185 Q140,180 120,120" fill="white"></path>
<!-- Tail -->
<path class="doodle-ink" d="M125,170 Q160,175 170,140 Q165,110 145,125" stroke-dasharray="2 2"></path>
<!-- Head -->
<path class="doodle-ink" d="M65,110 Q60,60 100,60 Q140,60 135,110 Q100,130 65,110 Z" fill="white"></path>
<!-- Ears -->
<path class="doodle-ink cat-ear" d="M75,70 L65,40 L90,65"></path>
<path class="doodle-ink cat-ear" d="M125,70 L135,40 L110,65"></path>
<g class="anim-eyes">
<path class="doodle-ink" d="M85,95 Q90,90 95,95" stroke-width="2"></path>
<path class="doodle-ink" d="M105,95 Q110,90 115,95" stroke-width="2"></path>
</g>
<!-- Whiskers -->
<path class="doodle-ink" d="M75,105 L55,100 M75,110 L55,115 M125,105 L145,100 M125,110 L145,115" opacity="0.5"></path>
<path class="doodle-ink" d="M95,110 Q100,115 105,110"></path>
</svg>
</div>
<span class="font-headline-lg text-primary uppercase">Gato</span>
</div>
<!-- Rabbit Character -->
<div class="polaroid p-4 pb-6 flex flex-col items-center cursor-pointer" onclick="selectCharacter(this, 'Conejo')" style="transform: rotate(-2deg)">
<div class="w-full aspect-square bg-white mb-4 flex items-center justify-center relative overflow-visible">
<svg class="w-full h-full" viewBox="0 0 200 200">
<!-- Body -->
<path class="doodle-ink" d="M75,130 Q60,180 100,185 Q140,180 125,130" fill="white"></path>
<!-- Head -->
<circle class="doodle-ink" cx="100" cy="100" fill="white" r="35"></circle>
<!-- Ears -->
<path class="doodle-ink" d="M80,70 Q70,20 85,20 Q100,20 95,70" fill="white"></path>
<path class="doodle-ink" d="M120,70 Q130,20 115,20 Q100,20 105,70" fill="white"></path>
<g class="anim-eyes">
<circle cx="88" cy="100" fill="#091426" r="3"></circle>
<circle cx="112" cy="100" fill="#091426" r="3"></circle>
</g>
<path class="doodle-ink" d="M97,110 L100,113 L103,110"></path>
<path class="doodle-ink" d="M95,118 Q100,122 105,118" opacity="0.7"></path>
</svg>
</div>
<span class="font-headline-lg text-primary uppercase">Conejo</span>
</div>
<!-- Dog Character -->
<div class="polaroid p-4 pb-6 flex flex-col items-center cursor-pointer" onclick="selectCharacter(this, 'Perro')" style="transform: rotate(1.5deg)">
<div class="w-full aspect-square bg-white mb-4 flex items-center justify-center relative overflow-visible">
<svg class="w-full h-full" viewBox="0 0 200 200">
<!-- Body -->
<path class="doodle-ink" d="M70,120 Q60,180 100,185 Q140,180 130,120" fill="white"></path>
<!-- Head -->
<path class="doodle-ink" d="M70,80 Q100,60 130,80 L135,110 Q100,130 65,110 Z" fill="white"></path>
<!-- Floppy Ears -->
<path class="doodle-ink" d="M70,80 Q50,80 55,110 Q60,130 75,110" fill="white"></path>
<path class="doodle-ink" d="M130,80 Q150,80 145,110 Q140,130 125,110" fill="white"></path>
<g class="anim-eyes">
<circle cx="85" cy="95" fill="#091426" r="4"></circle>
<circle cx="115" cy="95" fill="#091426" r="4"></circle>
</g>
<circle cx="100" cy="108" fill="#091426" r="5"></circle>
<path class="doodle-ink" d="M100,113 L100,118 Q100,122 95,122 M100,118 Q100,122 105,122"></path>
</svg>
</div>
<span class="font-headline-lg text-primary uppercase">Perro</span>
</div></div>
</main>
<div class="fixed bottom-0 left-0 w-full p-6 bg-transparent pointer-events-none flex justify-center z-50">
<button class="pointer-events-auto highlighter-btn sketchy-border bg-white px-12 py-4 text-headline-lg font-headline-lg text-primary transform hover:-translate-y-1 active:translate-y-1 transition-all" id="confirm-selection">
        CONFIRMAR SELECCIÓN
    </button>
</div>
<script>
    let selectedName = "";

    function selectCharacter(selectedCard, name) {
        document.querySelectorAll('.polaroid').forEach(card => {
            card.classList.remove('selected');
            card.classList.remove('jitter');
        });
        selectedCard.classList.add('selected');
        selectedCard.classList.add('jitter');
        selectedName = name;
    }

    document.getElementById('confirm-selection').addEventListener('click', () => {
        if (selectedName) {
            alert(`¡Avatar "${selectedName}" seleccionado! Redirigiendo al lobby...`);
        } else {
            alert('Por favor, selecciona un avatar primero.');
        }
    });
</script>
</body></html>
