<!-- Hen Character - GALLO PREMIUM -->
<div class="polaroid p-4 pb-6 flex flex-col items-center cursor-pointer" onclick="selectCharacter(this, 'Gallo')" style="transform: rotate(-1deg)">
<div class="w-full aspect-square bg-white mb-4 flex items-center justify-center relative overflow-visible">
<svg class="w-full h-full" viewBox="0 0 200 200">
<!-- Glow effect background -->
<defs>
<filter id="glow-rooster">
<feGaussianBlur stdDeviation="2" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
<radialGradient id="tail-gradient" cx="50%" cy="50%">
<stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
<stop offset="50%" style="stop-color:#FF8C42;stop-opacity:1" />
<stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.7" />
</radialGradient>
<radialGradient id="body-gradient" cx="50%" cy="50%">
<stop offset="0%" style="stop-color:#FFE66D;stop-opacity:1" />
<stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.9" />
</radialGradient>
<linearGradient id="crest-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" style="stop-color:#FF1744;stop-opacity:1" />
<stop offset="50%" style="stop-color:#D32F2F;stop-opacity:1" />
<stop offset="100%" style="stop-color:#C41C3B;stop-opacity:1" />
</linearGradient>
</defs>

<!-- Cresta (Comb) - Animated -->
<g class="gallo-crest" style="animation: crest-bounce 0.8s ease-in-out infinite; transform-origin: 100px 50px;">
<path d="M85,30 Q90,10 100,15 Q110,8 115,30 Q110,35 100,33 Q90,35 85,30" fill="url(#crest-gradient)" stroke="#C41C3B" stroke-width="1.5"/>
<path d="M95,25 Q100,15 105,25" fill="none" stroke="#FF6B6B" stroke-width="1" opacity="0.6"/>
</g>

<!-- Cuerpo (Body) -->
<ellipse cx="100" cy="120" rx="40" ry="45" fill="url(#body-gradient)" stroke="#FFB700" stroke-width="2" filter="url(#glow-rooster)"/>

<!-- Pecho (Chest) - Highlight -->
<ellipse cx="100" cy="110" rx="28" ry="32" fill="#FFED4E" opacity="0.6"/>

<!-- Cola (Tail) - Animated -->
<g class="gallo-tail" style="animation: tail-swish 1.2s ease-in-out infinite; transform-origin: 130px 110px;">
<path d="M135,100 Q160,80 170,50 Q165,55 150,70" fill="url(#tail-gradient)" stroke="#FF5722" stroke-width="2" stroke-linecap="round"/>
<path d="M138,105 Q165,90 175,65 Q170,70 155,85" fill="url(#tail-gradient)" stroke="#FF7043" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
<path d="M132,110 Q155,95 162,75 Q158,80 148,95" fill="#FFA500" stroke="#FF8C42" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</g>

<!-- Cabeza (Head) -->
<circle cx="100" cy="70" r="28" fill="url(#body-gradient)" stroke="#FFB700" stroke-width="2"/>

<!-- Barbilla roja (Wattle) -->
<ellipse cx="100" cy="95" rx="8" ry="12" fill="#FF1744" stroke="#D32F2F" stroke-width="1"/>

<!-- Ojos (Eyes) -->
<circle cx="88" cy="62" r="5" fill="white" stroke="#333" stroke-width="1"/>
<circle cx="88" cy="62" r="3" fill="#333"/>
<circle cx="85" cy="60" r="1.5" fill="white" opacity="0.7"/>

<circle cx="112" cy="62" r="5" fill="white" stroke="#333" stroke-width="1"/>
<circle cx="112" cy="62" r="3" fill="#333"/>
<circle cx="109" cy="60" r="1.5" fill="white" opacity="0.7"/>

<!-- Pico (Beak) -->
<polygon points="120,70 135,68 120,76" fill="#FFB700" stroke="#FF9800" stroke-width="1"/>
<polygon points="120,71 130,70 120,75" fill="#FFED4E" opacity="0.6"/>

<!-- Alas (Wings) -->
<g class="gallo-wing-left" style="animation: wing-flap 1s ease-in-out infinite; transform-origin: 75px 110px;">
<path d="M75,100 Q50,95 55,130 Q70,125 75,110" fill="#FFD700" stroke="#FFB700" stroke-width="1.5" opacity="0.8"/>
<path d="M72,105 Q55,105 60,130 Q68,120 72,110" fill="#FFED4E" opacity="0.5"/>
</g>

<g class="gallo-wing-right" style="animation: wing-flap-reverse 1s ease-in-out infinite; transform-origin: 125px 110px;">
<path d="M125,100 Q150,95 145,130 Q130,125 125,110" fill="#FFD700" stroke="#FFB700" stroke-width="1.5" opacity="0.8"/>
<path d="M128,105 Q145,105 140,130 Q132,120 128,110" fill="#FFED4E" opacity="0.5"/>
</g>

<!-- Patas (Legs) -->
<line x1="90" y1="160" x2="90" y2="180" stroke="#FF9800" stroke-width="2" stroke-linecap="round"/>
<line x1="110" y1="160" x2="110" y2="180" stroke="#FF9800" stroke-width="2" stroke-linecap="round"/>

<!-- Pies (Feet) -->
<g>
<line x1="85" y1="180" x2="95" y2="180" stroke="#FF9800" stroke-width="2" stroke-linecap="round"/>
<line x1="90" y1="180" x2="90" y2="185" stroke="#FF9800" stroke-width="1.5"/>
<line x1="87" y1="180" x2="87" y2="185" stroke="#FF9800" stroke-width="1.5"/>
<line x1="93" y1="180" x2="93" y2="185" stroke="#FF9800" stroke-width="1.5"/>
</g>

<g>
<line x1="105" y1="180" x2="115" y2="180" stroke="#FF9800" stroke-width="2" stroke-linecap="round"/>
<line x1="110" y1="180" x2="110" y2="185" stroke="#FF9800" stroke-width="1.5"/>
<line x1="107" y1="180" x2="107" y2="185" stroke="#FF9800" stroke-width="1.5"/>
<line x1="113" y1="180" x2="113" y2="185" stroke="#FF9800" stroke-width="1.5"/>
</g>

<!-- Shine/Spark particles - Animated -->
<g class="gallo-sparkles">
<circle cx="90" cy="50" r="2" fill="#FFD700" opacity="0" style="animation: sparkle 1.5s ease-in-out infinite;"/>
<circle cx="110" cy="45" r="1.5" fill="#FFED4E" opacity="0" style="animation: sparkle 1.5s ease-in-out infinite 0.3s;"/>
<circle cx="100" cy="30" r="2" fill="#FFB700" opacity="0" style="animation: sparkle 1.5s ease-in-out infinite 0.6s;"/>
<circle cx="75" cy="70" r="1.5" fill="#FFD700" opacity="0" style="animation: sparkle 1.5s ease-in-out infinite 0.9s;"/>
<circle cx="125" cy="75" r="2" fill="#FFED4E" opacity="0" style="animation: sparkle 1.5s ease-in-out infinite 1.2s;"/>
</g>
</svg>
</div>
<span class="font-headline-lg text-primary uppercase">Gallo</span>
</div>