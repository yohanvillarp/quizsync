<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_SVG_START:ANIMATION_45 class="fixed inset-0 w-full h-full" --><div class="fixed inset-0 w-full h-full" id="animated-svg-ANIMATION_45" style="display:block;"><svg class="w-full h-full" viewbox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
<!-- Background Paper Texture (Hand-drawn feel) -->
<rect fill="#faf9f5" height="600" width="800"></rect>
<!-- Washi Tape Borders -->
<rect fill="#ff7eb6" height="20" opacity="0.6" transform="rotate(-0.5, 400, 10)" width="800" x="0" y="0"></rect>
<rect fill="#70e0af" height="20" opacity="0.6" transform="rotate(0.3, 400, 590)" width="800" x="0" y="580"></rect>
<!-- Background Doodles (Stars, Scribbles) -->
<g fill="none" opacity="0.3" stroke="#1e293b" stroke-width="2">
<!-- Stars -->
<path d="M50,50 l5,10 l10,2 l-8,7 l2,10 l-9,-6 l-9,6 l2,-10 l-8,-7 l10,-2 z">
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.3;0.8;0.3"></animate>
</path>
<path d="M720,80 l4,8 l8,1 l-6,6 l1,8 l-7,-5 l-7,5 l1,-8 l-6,-6 l8,-1 z">
<animate attributename="opacity" dur="2.5s" repeatcount="indefinite" values="0.3;0.8;0.3"></animate>
</path>
<!-- Question Marks -->
<text fill="#1e293b" font-family="cursive" font-size="40" opacity="0.2" x="700" y="500">?</text>
<text fill="#1e293b" font-family="cursive" font-size="30" opacity="0.2" x="100" y="450">!</text>
</g>
<!-- Mascot Container -->
<g id="mascot" transform="translate(400, 350)">
<!-- Body (Blob-like, imperfect) -->
<path d="M-80,50 Q-100,-100 0,-120 Q100,-100 80,50 Q0,80 -80,50 Z" fill="#1e293b" stroke="#1e293b" stroke-width="4">
<animatetransform additive="sum" attributename="transform" dur="2s" repeatcount="indefinite" type="scale" values="1,1; 1.05,0.95; 1,1"></animatetransform>
</path>
<!-- Ears (Pointy, expressive) -->
<path d="M-60,-100 L-110,-160 L-30,-110 Z" fill="#1e293b" stroke="#1e293b" stroke-width="4">
<animatetransform attributename="transform" dur="2s" repeatcount="indefinite" type="rotate" values="0; -10; 0"></animatetransform>
</path>
<path d="M60,-100 L110,-160 L30,-110 Z" fill="#1e293b" stroke="#1e293b" stroke-width="4">
<animatetransform attributename="transform" dur="2s" repeatcount="indefinite" type="rotate" values="0; 10; 0"></animatetransform>
</path>
<!-- Eyes (Big, Expressive) -->
<g id="eyes">
<!-- Left Eye -->
<circle cx="-35" cy="-50" fill="white" r="20" stroke="#1e293b" stroke-width="3">
<animate attributename="r" begin="0s" dur="4s" repeatcount="indefinite" values="20; 25; 20"></animate>
</circle>
<circle cx="-35" cy="-50" fill="#1e293b" r="8">
<animate attributename="cy" dur="4s" repeatcount="indefinite" values="-50; -55; -50"></animate>
</circle>
<!-- Right Eye -->
<circle cx="35" cy="-50" fill="white" r="20" stroke="#1e293b" stroke-width="3">
<animate attributename="r" begin="0.5s" dur="4s" repeatcount="indefinite" values="20; 25; 20"></animate>
</circle>
<circle cx="35" cy="-50" fill="#1e293b" r="8">
<animate attributename="cy" dur="4s" repeatcount="indefinite" values="-50; -55; -50"></animate>
</circle>
</g>
<!-- Mouth (Excited/Nervous Smile) -->
<path d="M-20,0 Q0,20 20,0" fill="none" stroke="white" stroke-linecap="round" stroke-width="4">
<animate attributename="d" dur="2s" repeatcount="indefinite" values="M-20,0 Q0,20 20,0; M-25,5 Q0,25 25,5; M-20,0 Q0,20 20,0"></animate>
</path>
<!-- Hands (Waving/Encouraging) -->
<path d="M-80,-20 L-130,-60" fill="none" stroke="#1e293b" stroke-linecap="round" stroke-width="8">
<animatetransform attributename="transform" dur="1s" repeatcount="indefinite" type="rotate" values="0; -20; 0"></animatetransform>
</path>
<path d="M80,-20 L130,-60" fill="none" stroke="#1e293b" stroke-linecap="round" stroke-width="8">
<animatetransform attributename="transform" dur="1s" repeatcount="indefinite" type="rotate" values="0; 20; 0"></animatetransform>
</path>
</g>
<!-- Countdown Timer (Hand-drawn text) -->
<g transform="translate(400, 150)">
<rect fill="#facc15" height="100" rx="10" stroke="#1e293b" stroke-width="4" transform="rotate(-2)" width="200" x="-100" y="-50"></rect>
<text dy="30" fill="#1e293b" font-family="'Bricolage Grotesque', sans-serif" font-size="80" font-weight="900" text-anchor="middle">
<tspan x="0">
<animate attributename="opacity" dur="4s" keytimes="0;0.25;0.26" repeatcount="indefinite" values="1;1;0"></animate>
        4
      </tspan>
<tspan x="0">
<animate attributename="opacity" dur="4s" keytimes="0;0.26;0.5;0.51" repeatcount="indefinite" values="0;1;1;0"></animate>
        3
      </tspan>
<tspan x="0">
<animate attributename="opacity" dur="4s" keytimes="0;0.51;0.75;0.76" repeatcount="indefinite" values="0;1;1;0"></animate>
        2
      </tspan>
<tspan x="0">
<animate attributename="opacity" dur="4s" keytimes="0;0.76;1" repeatcount="indefinite" values="0;1;1"></animate>
        1
      </tspan>
</text>
</g>
<!-- Animated Text Phases -->
<text fill="#1e293b" font-family="'Bricolage Grotesque', sans-serif" font-size="40" font-weight="900" letter-spacing="2" text-anchor="middle" x="400" y="520">
<tspan x="400">
<animate attributename="opacity" dur="8s" keytimes="0;0.5" repeatcount="indefinite" values="1;0"></animate>
      ¡PREPÁRATE!
    </tspan>
<tspan x="400">
<animate attributename="opacity" dur="8s" keytimes="0.5;1" repeatcount="indefinite" values="0;1"></animate>
      PRÓXIMA RONDA
    </tspan>
</text>
</svg></div><!-- STITCH_SVG_END:ANIMATION_45 -->
</body>
</html>
