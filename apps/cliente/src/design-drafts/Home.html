<style>
        @keyframes jitter {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(1px, 1px) rotate(0.2deg); }
            50% { transform: translate(-1px, 0px) rotate(-0.2deg); }
            75% { transform: translate(1px, -1px) rotate(0.1deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        .animate-jitter {
            animation: jitter 0.2s infinite;
        }
        .animate-jitter-slow {
            animation: jitter 0.4s infinite;
        }

        .paper-grid {
            background-image: 
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .sketch-border {
            border: 2px solid #1e293b;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }

        .sketch-border-thick {
            border: 3px solid #1e293b;
            border-radius: 4px 12px 6px 14px/12px 4px 14px 6px;
        }

        .highlighter-effect {
            box-shadow: inset 0 -0.5em 0 0 #f2e580;
        }

        .offset-depth {
            position: relative;
        }
        .offset-depth::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 100%;
            height: 100%;
            background-color: #1e293b;
            z-index: -1;
            border-radius: inherit;
        }

        .wobbly-line {
            border-bottom: 2px solid #1e293b;
            border-radius: 100% 10% 90% 20%;
        }

        .doodle-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
    </style>

<script>
        // Simple micro-interaction for the PIN input
        const pinInput = document.querySelector('input[type="text"]');
        pinInput.addEventListener('input', (e) => {
            // Force numeric if possible, though it's styled for any code
            e.target.value = e.target.value.toUpperCase();
            
            // Jitter more on input
            const container = e.target.closest('.sketch-border-thick');
            container.style.transform = `rotate(${Math.random() * 2 - 1}deg) scale(1.02)`;
            setTimeout(() => {
                container.style.transform = '';
            }, 100);
        });

        // Add random "doodles" dynamically for extra flavor
        function addDoodle() {
            const symbols = ['star', 'favorite', 'rocket', 'bolt', 'mood'];
            const doodle = document.createElement('span');
            doodle.className = 'material-symbols-outlined absolute pointer-events-none opacity-10 text-primary-container';
            doodle.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            doodle.style.left = Math.random() * 90 + '%';
            doodle.style.top = Math.random() * 90 + '%';
            doodle.style.fontSize = (Math.random() * 40 + 20) + 'px';
            doodle.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(doodle);
        }

        for(let i=0; i<8; i++) addDoodle();
